name: Quick Note CI & CD

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  IMAGE_URL: asia-south1-docker.pkg.dev/quck-note/quick-note/quick-note
  NAMESPACE: quick-note
  CLUSTER_NAME: quick-note

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: |
          gcloud auth configure-docker asia-south1-docker.pkg.dev --quiet

      - name: Install GKE gcloud auth plugin
        run: |
          gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Enable GKE auth plugin
        run: |
          echo "USE_GKE_GCLOUD_AUTH_PLUGIN=True" >> $GITHUB_ENV

      - name: Build and Push Docker Image
        run: |
          COMMIT_SHA=$(git rev-parse HEAD)
          echo $COMMIT_SHA > COMMIT_SHA.txt

          docker build \
            -t $IMAGE_URL:$COMMIT_SHA \
            -t $IMAGE_URL:latest .

          docker push $IMAGE_URL:$COMMIT_SHA
          docker push $IMAGE_URL:latest

      - name: Get GKE Credentials
        run: |
          gcloud container clusters get-credentials $CLUSTER_NAME \
            --zone us-central1 \
            --project quck-note

      - name: Deploy to GKE
        run: |
          COMMIT_SHA=$(cat COMMIT_SHA.txt)

          kubectl create namespace $NAMESPACE \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl apply -f k8s/

          # Update image to the exact commit SHA
          kubectl set image deployment/quick-note \
            quick-note=$IMAGE_URL:$COMMIT_SHA \
            -n $NAMESPACE

          # Wait for rollout to complete
          kubectl rollout status deployment/quick-note \
            -n $NAMESPACE --timeout=5m
          