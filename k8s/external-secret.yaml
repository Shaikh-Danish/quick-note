apiVersion: external-secrets.io/v1
kind: ExternalSecret

metadata:
  name: quick-note-secrets
  namespace: quick-note
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: gcp-secret-store
    kind: SecretStore

  target:
    name: quick-note-gcp-secret

  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: DATABASE_URL

    - secretKey: R2_ENDPOINT
      remoteRef:
        key: R2_ENDPOINT

    - secretKey: R2_ACCESS_KEY_ID
      remoteRef:
        key: R2_ACCESS_KEY_ID

    - secretKey: R2_SECRET_ACCESS_KEY
      remoteRef:
        key: R2_SECRET_ACCESS_KEY

    - secretKey: R2_BUCKET_NAME
      remoteRef:
        key: R2_BUCKET_NAME